# Postgres local — ver docs/LOCAL_DATABASE.md
# `docker compose up -d` e depois: npx prisma db push
services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thcproce_campus
    volumes:
      - thcproce_pgdata:/var/lib/postgresql/data

volumes:
  thcproce_pgdata:
