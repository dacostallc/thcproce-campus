[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NETLIFY_NEXT_SKEW_PROTECTION = "true"

# Next.js 13.5+ is handled by Netlify's OpenNext adapter automatically.
# Do not pin @netlify/plugin-nextjs unless a future deploy log asks for it.
